name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Auto-fix pre-commit
        run: |
          pre-commit run --all-files --exclude 'webui/vendor/*'
          git add .
          git commit -m "Apply pre-commit fixes" || echo "No changes to commit"
          git push

      # Optional: auto-fix and commit changes back to the branch
      - name: Auto-fix and push
        if: github.event_name == 'push'
        run: |
          pre-commit run --all-files --show-diff-on-failure
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply pre-commit fixes" || echo "No changes to commit"
          git push
  
